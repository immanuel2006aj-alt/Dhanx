<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dhanx</title>

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>

/* GLOBAL */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f5f7fb;
}

/* HEADER */
header {
    background: #0b1d3a;
    color: white;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-family: 'Poppins', sans-serif;
    font-size: 22px;
    font-weight: 600;
}

/* HERO SECTION */
.hero {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 60px 40px;
    gap: 20px;
}

/* LEFT TEXT */
.hero-text {
    max-width: 500px;
}

.hero-text h1 {
    font-family: 'Poppins', sans-serif;
    font-size: 40px;
    line-height: 1.3;
}

.hero-text span {
    color: #00c896;
}

.hero-text p {
    margin-top: 15px;
    color: #555;
}

/* BUTTON */
.btn {
    margin-top: 20px;
    display: inline-block;
    background: linear-gradient(45deg, #00c896, #00aaff);
    padding: 12px 25px;
    border-radius: 25px;
    color: white;
    text-decoration: none;
}

/* RIGHT IMAGE */
.hero-img img {
    width: 400px;
    max-width: 100%;
}

/* FOOTER */
footer {
    background: #0b1d3a;
    color: white;
    text-align: center;
    padding: 20px;
}

/* MOBILE */
@media (max-width: 768px) {
    .hero {
        flex-direction: column;
        text-align: center;
    }

    .hero-text h1 {
        font-size: 28px;
    }

    .hero-img img {
        width: 100%;
    }
}

</style>
</head>

<body>

<!-- HEADER -->
<header>
    <div class="logo">DHANX</div>
</header>

<!-- HERO -->
<section class="hero">

    <!-- LEFT CONTENT -->
    <div class="hero-text">
        <h1>Empowering Your <span>Digital Journey</span></h1>
        <p>Explore flexible online opportunities and grow with Dhanx ecosystem.</p>
        <a href="#" class="btn">Get Started</a>
    </div>

    <!-- RIGHT IMAGE -->
    <div class="hero-img">
        <img src="banner.jpg" alt="Team Working">
    </div>

</section>

<!-- FOOTER -->
<footer>
    <p>Dhanx Digital Solutions</p>
    <p>© 2026 Dhanx</p>
</footer>

</body>
</html>
